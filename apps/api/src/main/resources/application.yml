spring:
  application:
    name: flowticket-api
  datasource:
    url: jdbc:postgresql://localhost:${DB_PORT:5433}/flowticket
    username: flowticket
    password: ${DB_PASSWORD:flowticket}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  data:
    redis:
      host: localhost
      port: 6379
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: flowticket
      auto-offset-reset: earliest
  security:
    oauth2:
      client:
        registration:
          naver:
            client-name: naver
            # 키 미설정 환경(CI/키 없는 dev)에서도 부팅되도록 비어있지 않은 기본값.
            # 실제 값은 환경변수로 주입. 미설정 시 네이버 로그인만 런타임에 실패.
            client-id: ${NAVER_CLIENT_ID:not-configured}
            client-secret: ${NAVER_CLIENT_SECRET:not-configured}
            redirect-uri: "{baseUrl}/login/oauth2/code/naver"
            authorization-grant-type: authorization_code
            scope: name, email
        provider:
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus

# 외부 연동 / 시크릿은 환경변수로만 주입 (application-local.yml은 gitignore)
kopis:
  base-url: http://www.kopis.or.kr/openApi/restful
  service-key: ${KOPIS_SERVICE_KEY:}

jwt:
  secret: ${JWT_SECRET:}
  access-token-ttl: 1800
  refresh-token-ttl: 1209600

# 소셜 로그인 성공 후 프론트로 리다이렉트(토큰은 httpOnly 쿠키, URL 비노출)
app:
  oauth2:
    success-redirect: ${OAUTH_SUCCESS_REDIRECT:http://localhost:3000}
    failure-redirect: ${OAUTH_FAILURE_REDIRECT:http://localhost:3000/login?error=oauth}

# 휴대폰 인증: 데모는 Mock(고정 코드). 운영은 mock=false + 실제 SMS 연동.
auth:
  phone:
    mock: true
    mock-code: "123456"
