spring:
  application:
    name: flowticket-api
  datasource:
    url: jdbc:postgresql://localhost:${DB_PORT:5433}/flowticket
    username: flowticket
    password: ${DB_PASSWORD:flowticket}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  data:
    redis:
      host: localhost
      port: 6379
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: flowticket
      auto-offset-reset: earliest
  security:
    oauth2:
      client:
        registration:
          naver:
            client-name: naver
            # 키 미설정 환경(CI/키 없는 dev)에서도 부팅되도록 비어있지 않은 기본값.
            # 실제 값은 환경변수로 주입. 미설정 시 네이버 로그인만 런타임에 실패.
            client-id: ${NAVER_CLIENT_ID:not-configured}
            client-secret: ${NAVER_CLIENT_SECRET:not-configured}
            redirect-uri: "{baseUrl}/login/oauth2/code/naver"
            authorization-grant-type: authorization_code
            scope: name, email
          kakao:
            client-name: kakao
            client-id: ${KAKAO_CLIENT_ID:not-configured}
            client-secret: ${KAKAO_CLIENT_SECRET:not-configured}
            redirect-uri: "{baseUrl}/login/oauth2/code/kakao"
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
            scope: profile_nickname, account_email
        provider:
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus

# 외부 연동 / 시크릿은 환경변수로만 주입 (application-local.yml은 gitignore)
kopis:
  base-url: http://www.kopis.or.kr/openApi/restful
  service-key: ${KOPIS_SERVICE_KEY:}
  sync:
    days: ${KOPIS_SYNC_DAYS:90}            # 오늘부터 며칠치 수집(31일 청크로 분할)
    rows: ${KOPIS_SYNC_ROWS:100}          # 페이지당 행 수(KOPIS 최대 100)
    max-pages: ${KOPIS_SYNC_MAX_PAGES:10} # 청크당 페이지 상한(안전장치)

jwt:
  secret: ${JWT_SECRET:}
  access-token-ttl: 1800
  refresh-token-ttl: 1209600

# 소셜 로그인 성공 후 프론트로 리다이렉트(토큰은 httpOnly 쿠키, URL 비노출)
app:
  oauth2:
    success-redirect: ${OAUTH_SUCCESS_REDIRECT:http://localhost:3000}
    failure-redirect: ${OAUTH_FAILURE_REDIRECT:http://localhost:3000/login?error=oauth}
  cookie:
    # 데모는 http라 false. 운영(HTTPS)에서는 COOKIE_SECURE=true로 주입.
    secure: ${COOKIE_SECURE:false}
  proxy:
    # 신뢰하는 프록시 IP(콤마 구분). 이 IP에서 온 요청의 X-Forwarded-For만 신뢰한다.
    # 비어 있으면(기본) XFF 무시 → remoteAddr 사용(위조 방지). 운영 LB IP를 주입.
    trusted: ${TRUSTED_PROXIES:}

# 대기열(S03) — Redis ZSet 기반 선착순 직렬화
queue:
  capacity: ${QUEUE_CAPACITY:100}            # 이벤트당 동시 입장 정원
  token-ttl: ${QUEUE_TOKEN_TTL:1800}         # 대기 토큰 수명(초)
  admit-ttl: ${QUEUE_ADMIT_TTL:300}          # 입장 후 좌석선택 제한(초)
  admit-interval-ms: ${QUEUE_ADMIT_INTERVAL:1500}  # 승격 워커 주기(ms)

# 좌석·재고(S04)
seat:
  hold-ttl: ${SEAT_HOLD_TTL:300}          # 선점 유지 시간(초, ~5분)
  max-per-user: ${SEAT_MAX_PER_USER:4}    # 이벤트당 1인 구매 한도
  sweep-interval-ms: ${SEAT_SWEEP_INTERVAL:60000}  # 만료 회수 워커 주기(ms)

# 주문·결제(S05)
order:
  sweep-interval-ms: ${ORDER_SWEEP_INTERVAL:60000}  # 미완료 주문 만료 회수 주기(ms)

# 결제 게이트웨이 선택(ADR-005). mock=결정론(테스트/E2E/CI 기본), toss=실 PG 테스트 연동(데모).
payment:
  gateway: ${PAYMENT_GATEWAY:mock}

# 취소 수수료 정책(S06). 공연일까지 남은 일수 기준 기간별 수수료율(%). 당일·이후는 환불 불가.
refund:
  free-days: ${REFUND_FREE_DAYS:8}     # 이 일수 이상 남으면 0%
  tier1-days: ${REFUND_TIER1_DAYS:3}   # 이 일수 이상 남으면 tier1 수수료율
  tier1-rate: ${REFUND_TIER1_RATE:10}  # D-3~D-7 (%)
  tier2-rate: ${REFUND_TIER2_RATE:30}  # D-1~D-2 (%)

# 관리자 계정 부트스트랩(S07). 둘 다 설정 시 최초 1회 ROLE_ADMIN 생성. 자격증명은 환경변수로만.
admin:
  email: ${ADMIN_EMAIL:}
  password: ${ADMIN_PASSWORD:}

# 휴대폰 인증: 데모는 Mock(고정 코드). 운영은 mock=false + 실제 SMS 연동.
auth:
  phone:
    mock: true
    mock-code: "123456"
