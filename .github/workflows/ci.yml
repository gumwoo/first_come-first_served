name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  harness-meta:
    name: 하네스 메타테스트 (위반 fixture 차단 확인)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: install harness deps
        working-directory: harness
        run: npm ci || npm install
      - name: contract schema check (계약 형식 검증)
        working-directory: harness
        run: node schema-check.mjs
      - name: meta test (false-negative guard)
        working-directory: harness
        run: node meta-test.mjs

  backend:
    name: 백엔드 (하네스 → 테스트)
    runs-on: ubuntu-latest
    needs: harness-meta
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"
      - name: harness deps
        working-directory: harness
        run: npm ci || npm install
      - name: backend harness check
        run: node harness/backend/check.mjs
      - name: gradle build (test 포함)
        working-directory: apps/api
        run: gradle build --no-daemon

  frontend:
    name: 프론트 (하네스 → lint → build)
    runs-on: ubuntu-latest
    needs: harness-meta
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - name: harness deps
        working-directory: harness
        run: npm ci || npm install
      - name: frontend harness check
        run: node harness/frontend/check.mjs
      - name: install
        working-directory: apps/web
        run: pnpm install --frozen-lockfile || pnpm install
      - name: typecheck
        working-directory: apps/web
        run: pnpm typecheck
      - name: lint
        working-directory: apps/web
        run: pnpm lint
      - name: build
        working-directory: apps/web
        run: pnpm build
