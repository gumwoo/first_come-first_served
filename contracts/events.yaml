# Kafka 이벤트 계약 — BE 발행 목록 ↔ FE 구독 목록 diff.
# 이벤트명 규약: <aggregate>.<past-tense>  (예: order.paid)

topics:
  order:
    - order.created          # 주문 생성(PENDING)
    - order.paid             # 결제 완료
    - order.failed           # 결제 실패
    - order.cancelled        # 취소
    - order.refunded         # 환불 완료
  seat:
    - seat.held              # 좌석 선점
    - seat.hold.released     # 선점 해제
    - seat.hold.expired      # 선점 만료(재고 복구)
  queue:
    - queue.admitted         # 대기열 입장 허용
    - queue.expired          # 대기 토큰 만료
  payment:
    - payment.vbank.deposited  # 무통장 입금 확인

# BE가 발행하는 전체(위 토픽의 flatten)
publishes:
  - order.created
  - order.paid
  - order.failed
  - order.cancelled
  - order.refunded
  - seat.held
  - seat.hold.released
  - seat.hold.expired
  - queue.admitted
  - queue.expired
  - payment.vbank.deposited

# FE(실시간 갱신용 SSE/WebSocket)가 구독해야 하는 목록.
# publishes ⊇ fe_subscribes 여야 하고, 누락 시 하네스 실패.
fe_subscribes:
  - order.paid
  - order.failed
  - seat.hold.expired
  - queue.admitted
  - queue.expired
  - payment.vbank.deposited

# 실시간 UI에 반드시 필요한 이벤트 — FE가 구독을 빠뜨리면 하네스 실패.
# (fe_subscribes ⊇ required_fe_subscribes 검증)
required_fe_subscribes:
  - queue.admitted        # 입장 허용 → 좌석선택 이동에 필수
  - queue.expired         # 대기 만료 → 만료 화면 전환에 필수
  - seat.hold.expired     # 선점 만료 → 좌석 해제 반영에 필수
  - order.paid            # 결제 완료 → 완료 화면 전환에 필수
  - payment.vbank.deposited  # 무통장 입금 확인 → 완료 전환에 필수

# 이미 구현되어 백엔드가 "실제로 발행"해야 하는 이벤트(슬라이스 완료분).
# 하네스가 백엔드 소스에서 각 이벤트명 문자열 발행부를 찾지 못하면 실패.
# (publishes ⊇ implemented. 미구현 이벤트는 여기 넣지 않는다 — 계약 선언만은 허용.)
implemented:
  - seat.held
  - seat.hold.released
  - seat.hold.expired
  - queue.admitted
  - queue.expired
  - order.paid

# DLQ 토픽 명명규약 (재처리 센터에서 사용)
dlq_suffix: ".DLT"
